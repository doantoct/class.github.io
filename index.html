<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ricerca Documentale</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* ===== LOGIN PERFETTAMENTE CENTRATO ===== */

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

/* Centra tutto nello schermo */
#loginPage {

    max-width: 900px;
    margin: auto;        /* stesso centraggio ricerca */
    padding-top: 10px;   /* stessa altezza ricerca */

}

/* Logo e titolo */
#loginPage .header {
    text-align: center;
    margin-bottom: 20px;
}

/* Card login */
.login-card {
    background: #e9e9e9;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    width: 420px;
    max-width: 90%;
}

/* Titolo */
.login-title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 25px;
}

/* Campi input */
.login-card input {

    width: 100%;
    box-sizing: border-box;

    padding: 14px 16px;

    border-radius: 8px;
    border: 1px solid #bbb;

    font-size: 16px;
    margin-bottom: 15px;

}

/* Bottone */
.login-card button {

    width: 100%;
    box-sizing: border-box;

    padding: 14px;

    border-radius: 8px;
    font-size: 18px;

    background: #1976d2;
}

/* Messaggi */
.error, .success {

    width: 100%;
    box-sizing: border-box;
}






/* ===== STILE GENERALE ===== */
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background: #f4f6f9;
}
h2 {
  text-align: center;
  color: #333;
}
.header {
    text-align: center;
    margin-top: 10px;    /* stessa posizione ricerca */
    margin-bottom: 15px;
}
.logo {
  max-width: 120px;
  margin-bottom: 10px;
  cursor: pointer;
}
.logo:hover {
  opacity: 0.8;
  transform: scale(1.05);
  transition: 0.2s;
}
input, button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 10px;
}
input {
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
button:active { background: #0056b3; }

/* ===== STILE RISULTATI ===== */
.gruppo {
  background: white;
  padding: 14px;
  margin-top: 10px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.record {
  background: white;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}
.record:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  transition: 0.2s;
}
.gruppo-dettaglio {
  background: linear-gradient(135deg, #007bff, #0056b3);
  color: white;
  padding: 16px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 15px;
}
.badge-container {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.badge {
  padding: 4px 8px;
  font-size: 14px;
  border-radius: 20px;
  font-weight: bold;
}
.categoria { background: #28a745; color: white; }
.classe { background: #17a2b8; color: white; }
.label { font-weight: bold; color: #444; }
.bottoni-dettaglio {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}
.bottoni-dettaglio button { flex: 1; }

/* ===== STILE TITOLO ESEMPI ===== */
.titolo-esempi {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 20px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}
.titolo-esempi h3 {
  margin: 0 0 10px 0;
  font-size: 20px;
  font-weight: 600;
}
.badge-titolo {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  margin: 0 6px;
  text-transform: uppercase;
}
.badge-cat { background: #28a745; }
.badge-cl { background: #17a2b8; }

/* ===== LOGIN ===== */
#loginPage {
  max-width: 420px;
  margin: 40px auto;
}
.login-card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.10);
}
.login-title {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 14px;
}
.login-hint {
  font-size: 13px;
  color: #555;
  margin-top: 6px;
  text-align: center;
}
.error {
  background: #ffe5e5;
  color: #b30000;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: none;
}
.success {
  background: #e8ffe8;
  color: #146b14;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: none;
}

/* Centra input + bottone della ricerca */
.search-container{
  max-width: 900px;
  margin: 0 auto;
}

#appPage input, 
#appPage button{
  width: 100%;
  box-sizing: border-box;
}

/* App nascosta finché non fai login */
#appPage { display: none; }
</style>
</head>

<body>

<!-- ===================== LOGIN PAGE ===================== -->
<div id="loginPage">
  <div class="header">
    <img src="logo.png" alt="Logo" class="logo" />
    <h2>Ricerca Documentale</h2>
  </div>

  <div class="login-card">
    <div class="login-title">🔐 Accesso</div>

    <div id="loginError" class="error">Mail o password non valide.</div>
    <div id="loginSuccess" class="success">Accesso effettuato. ✅</div>

    <input type="email" id="loginMail" placeholder="Inserisci la tua mail" autocomplete="username" />
    <input type="password" id="loginPassword" placeholder="Inserisci la password" autocomplete="current-password" />

    <button onclick="login()">Entra</button>


  </div>
</div>

<!-- ===================== APP PAGE ===================== -->
<div id="appPage">

  <div class="header">
    <img src="logo.png" alt="Logo" class="logo" onclick="tornaHome()" />
    <h2>Ricerca Documentale</h2>
  </div>

<div class="search-container">
<input type="text" id="searchInput" list="fascicoliList"
  placeholder="Inserisci una o più parole. Per risultati più ampi, ometti l’ultimo carattere (es.: mandato/i → mandat).">

<datalist id="fascicoliList"></datalist>
  <button onclick="cerca()">Cerca</button>
</div>

  <div id="risultati"></div>

</div>

<script>
/* =========================================================
   CONFIG
========================================================= */
const FILE_UTENTI = "utenti.xlsx";   // excel con login (mail, password)
const FILE_DATI   = "uscita.xlsx";   // excel con dati per ricerca

let utenti = [];
let dati = [];
let datiCaricati = false;
let utentiCaricati = false;

/* =========================================================
   UTILS
========================================================= */
function normalizeString(v) {
  return (v ?? "").toString().trim();
}
function normalizeMail(v) {
  return normalizeString(v).toLowerCase();
}
function show(el) { el.style.display = "block"; }
function hide(el) { el.style.display = "none"; }

/* =========================================================
   CARICAMENTO EXCEL UTENTI
========================================================= */
fetch(FILE_UTENTI)
  .then(r => {
    if (!r.ok) throw new Error("Errore caricamento utenti.xlsx");
    return r.arrayBuffer();
  })
  .then(buf => {
    const wb = XLSX.read(buf, { type: "array" });
    const sh = wb.Sheets[wb.SheetNames[0]];
    utenti = XLSX.utils.sheet_to_json(sh);
    utentiCaricati = true;
  })
  .catch(err => {
    console.error(err);
    alert("Errore nel caricamento di utenti.xlsx (controlla nome file e che sia nella stessa cartella).");
  });

/* =========================================================
   CARICAMENTO EXCEL DATI (la tua ricerca)
========================================================= */
fetch(FILE_DATI)
  .then(r => {
    if (!r.ok) throw new Error("Errore caricamento uscita.xlsx");
    return r.arrayBuffer();
  })
  .then(buf => {
    const wb = XLSX.read(buf, { type: "array" });
    const sh = wb.Sheets[wb.SheetNames[0]];
    dati = XLSX.utils.sheet_to_json(sh);
    datiCaricati = true;

    // ✅ crea suggerimenti per l'input dalla colonna FASCICOLO
    buildFascicoliDatalist();
  })
  .catch(err => {
    console.error(err);
    alert("Errore nel caricamento del file Excel uscita.xlsx");
  });

/* =========================================================
   LOGIN
========================================================= */
document.getElementById("loginPassword").addEventListener("keypress", function(e) {
  if (e.key === "Enter") login();
});
document.getElementById("loginMail").addEventListener("keypress", function(e) {
  if (e.key === "Enter") login();
});

function login() {
  const errBox = document.getElementById("loginError");
  const okBox  = document.getElementById("loginSuccess");
  hide(errBox); hide(okBox);

  if (!utentiCaricati) {
    alert("Attendi: sto caricando utenti.xlsx...");
    return;
  }
  if (!datiCaricati) {
    alert("Attendi: sto caricando uscita.xlsx...");
    return;
  }

  const mail = normalizeMail(document.getElementById("loginMail").value);
  const pass = normalizeString(document.getElementById("loginPassword").value);
  
  // Controllo formato mail
if (!mail.includes("@")) {

    show(errBox);
    errBox.textContent = "Inserisci una mail valida (deve contenere @)";

    return;
}

  if (!mail || !pass) {
    show(errBox);
    errBox.textContent = "Inserisci mail e password.";
    return;
  }

  // Cerca match su Excel (colonne: mail, password)
  const trovato = utenti.some(u => {
    const m = normalizeMail(u["mail"]);
    const p = normalizeString(u["password"]);
    return m === mail && p === pass;
  });

  if (!trovato) {
    show(errBox);
    errBox.textContent = "Mail o password non valide.";
    return;
  }

  show(okBox);

  // Mostra app
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appPage").style.display = "block";

  // Focus ricerca
  setTimeout(() => {
    document.getElementById("searchInput").focus();
  }, 100);
}

/* =========================================================
   APP: HOME
========================================================= */
function tornaHome() {
  // Semplice reset vista app
  document.getElementById("searchInput").value = "";
  document.getElementById("risultati").innerHTML = "";
}

/* =========================================================
   INVIO CON ENTER (RICERCA)
========================================================= */
document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") cerca();
});

/* =========================================================
   FUNZIONE RICERCA (come tua)
========================================================= */
function cerca() {

  const input = document.getElementById("searchInput").value.toLowerCase();
  const parole = input.split(" ").filter(p => p);
  const risultatiDiv = document.getElementById("risultati");
  risultatiDiv.innerHTML = "";

  if (parole.length === 0) return;

  let filtrati = dati.filter(riga => {
    let fascicolo = (riga["FASCICOLO"] || "").toString().toLowerCase();
    return parole.every(p => fascicolo.includes(p));
  });

  // ✅ SE NON TROVA RISULTATI
  if (!filtrati || filtrati.length === 0) {
    risultatiDiv.innerHTML = `
      <div class="record" style="text-align:center;">
        <div style="font-weight:bold; margin-bottom:10px; font-size:18px;">
          Nessun risultato trovato <br>
        </div>
        <div style="margin-top:10px;">
          <a href="https://immediaspa.com/area_clienti/"
             target="_blank"
             style="color:#007bff; font-weight:bold;">
             contatta il nostro consulete
          </a>
        </div>
      </div>
    `;
    return;
  }

  let gruppi = {};

  filtrati.forEach(riga => {
    let descrizione = riga["DESCRIZIONE CLASSE"] || "Senza descrizione";
    if (!gruppi[descrizione]) gruppi[descrizione] = [];
    gruppi[descrizione].push(riga);
  });

  for (let descrizione in gruppi) {
    let divGruppo = document.createElement("div");
    divGruppo.className = "gruppo";
    divGruppo.innerText = descrizione;
    divGruppo.onclick = function() {
      mostraDettaglio(descrizione, gruppi[descrizione]);
    };
    risultatiDiv.appendChild(divGruppo);
  }
}

/* =========================================================
   DETTAGLIO (come tua)
========================================================= */
function mostraDettaglio(descrizione, records) {

  const risultatiDiv = document.getElementById("risultati");
  risultatiDiv.innerHTML = "";

  let headerBox = document.createElement("div");
  headerBox.className = "gruppo-dettaglio";
  headerBox.innerText = descrizione;
  risultatiDiv.appendChild(headerBox);

  let unici = {};

  records.forEach(riga => {
    let chiave = (riga["Tipologia"] || "") + "|" + (riga["Durata"] || "");
    if (!unici[chiave]) unici[chiave] = riga;
  });

  for (let chiave in unici) {
    let item = unici[chiave];

    let divRecord = document.createElement("div");
    divRecord.className = "record";

    divRecord.innerHTML = `
      <div class="badge-container">
        <div class="badge categoria">Categoria: ${item["Categoria"] ?? ""}</div>
        <div class="badge classe">Classe: ${item["Classe"] ?? ""}</div>
      </div>
      <div><span class="label">Tipologia documentaria:</span> ${item["Tipologia"] ?? ""}</div>
      <div><span class="label">Conservazione:</span> ${item["Durata"] ?? ""}</div>
    `;

    risultatiDiv.appendChild(divRecord);
  }

  let contenitoreBottoni = document.createElement("div");
  contenitoreBottoni.className = "bottoni-dettaglio";

  let bottoneIndietro = document.createElement("button");
  bottoneIndietro.innerText = "← Torna ai gruppi";
  bottoneIndietro.onclick = cerca;

  let bottoneEsempi = document.createElement("button");
  bottoneEsempi.innerText = "Mostra esempi";
  bottoneEsempi.onclick = function() {
    mostraEsempi(records);
  };

  contenitoreBottoni.appendChild(bottoneIndietro);
  contenitoreBottoni.appendChild(bottoneEsempi);

  risultatiDiv.appendChild(contenitoreBottoni);
}

/* =========================================================
   MOSTRA ESEMPI (come tua)
========================================================= */
function mostraEsempi(records) {

  const risultatiDiv = document.getElementById("risultati");
  risultatiDiv.innerHTML = "";

  if (!records.length) return;

  let categoriaSelezionata = records[0]["Categoria"];
  let classeSelezionata = records[0]["Classe"];

  // 🔹 Filtra per categoria + classe
  let filtrati = dati.filter(riga =>
    riga["Categoria"] === categoriaSelezionata &&
    riga["Classe"] === classeSelezionata
  );

  let struttura = {};

  filtrati.forEach(riga => {
    let fascicolo = (riga["FASCICOLO"] || "Senza fascicolo").toString().trim();
    let sottofascicolo = (riga["SOTTOFASCICOLO"] || "").toString().trim();

    if (!struttura[fascicolo]) struttura[fascicolo] = new Set();

    if (sottofascicolo !== "") struttura[fascicolo].add(sottofascicolo);
  });

  // 🔹 Titolo
  let titolo = document.createElement("div");
  titolo.className = "titolo-esempi";
  titolo.innerHTML = `
    <h3>📂 Esempi di creazione Fascicoli e Sottofascicoli</h3>
    <div>
      <span class="badge-titolo badge-cat">Categoria ${categoriaSelezionata ?? ""}</span>
      <span class="badge-titolo badge-cl">Classe ${classeSelezionata ?? ""}</span>
    </div>
  `;
  risultatiDiv.appendChild(titolo);

  // 🔹 Stampa struttura
  for (let fascicolo in struttura) {

    let divFascicolo = document.createElement("div");
    divFascicolo.className = "record";

    let html = `
      <div>
        <span class="label"> 📁 FASCICOLO:</span>
        <strong style="text-transform: uppercase;">${fascicolo}</strong>
      </div>
    `;

    struttura[fascicolo].forEach(sotto => {
      html += `
        <div style="margin-left:25px; margin-top:5px;">
          <span class="label">Sottofascicolo:</span> <em>${sotto.toString().toLowerCase()}</em>
        </div>
      `;
    });

    divFascicolo.innerHTML = html;
    risultatiDiv.appendChild(divFascicolo);
  }

  // 🔹 Bottone ritorno
  let bottoneIndietro = document.createElement("button");
  bottoneIndietro.innerText = "← Torna al dettaglio";
  bottoneIndietro.onclick = cerca;

  risultatiDiv.appendChild(bottoneIndietro);
}

function buildFascicoliDatalist() {
  const dl = document.getElementById("fascicoliList");
  if (!dl) return;

  // Prendo tutti i fascicoli unici
  const set = new Set();
  dati.forEach(r => {
    const f = (r["FASCICOLO"] ?? "").toString().trim();
    if (f) set.add(f);
  });

  // Svuoto e riempio il datalist
  dl.innerHTML = "";
  [...set]
    .sort((a,b) => a.localeCompare(b, "it", { sensitivity: "base" }))
    .forEach(val => {
      const opt = document.createElement("option");
      opt.value = val;
      dl.appendChild(opt);
    });
}
</script>

</body>
</html>
