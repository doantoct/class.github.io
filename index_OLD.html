<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ricerca Documentale</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.8.0/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#f3f5f8;
      --brand:#0b75ff;
      --pillCat:#1f9d4c;
      --pillCls:#14a3b8;
      --border:#e7ebf0;
      --shadow: 0 10px 22px rgba(0,0,0,.08);
      --logoWidth: 120px;
    }

    body{ background:var(--bg); }

    /* ===== LOGO ===== */
    .logo-wrap{ margin:0 auto 14px; text-align:center; }
    .logo-link{ display:inline-block; text-decoration:none; outline:none; border:none; }
    .logo-link:focus,.logo-link:active,.logo-link:focus-visible{ outline:none !important; box-shadow:none !important; }
    .logo-img{
      width: var(--logoWidth);
      height:auto;
      display:block;
      transition: transform .25s ease, filter .25s ease;
    }
    .logo-link:hover .logo-img{
      transform: translateY(-6px) scale(1.05);
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.15));
    }

    /* ===== LOGIN ===== */
    .login-wrap{ max-width:520px; margin:10vh auto 0; padding:0 12px; }
    .login-card{
      background:#fff; border:1px solid var(--border); border-radius:14px;
      box-shadow: var(--shadow); padding:18px;
    }
    .login-title{ font-size:22px; font-weight:900; margin:6px 0 12px; color:#1f2a37; text-align:center; }
    .login-sub{ text-align:center; color:#6b7280; font-size:14px; margin-bottom:14px; }
    .input-lg{ height:58px; border-radius:8px !important; font-size:18px; padding-left:16px; background:#fff; }
    .login-actions .btn{
      height:54px; border-radius:10px; font-weight:900; font-size:18px;
      background:var(--brand); border:1px solid var(--brand);
    }
    .login-status{ margin-top:10px; font-size:13px; }

    /* ===== TOPBAR ===== */
    .topbar{
      max-width:1240px; margin:16px auto 0; padding:0 12px;
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
    }
    .topbar-user{
      display:flex; align-items:center; gap:10px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding: 8px 10px;
      box-shadow: var(--shadow);
      font-weight:800;
      color:#111827;
      max-width:100%;
    }
    .topbar-user .who{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 70vw;
    }
    .btn-logout{
      border-radius:999px;
      font-weight:900;
      padding: 6px 10px;
      white-space:nowrap;
    }

    /* ===== HERO ===== */
    .hero{ max-width:1240px; margin:0 auto; text-align:center; padding:24px 12px 0; }
    h1{ font-size:clamp(24px,2.6vw,38px); font-weight:900; margin:0 0 14px; color:#1f2a37; }

    /* ===== SEARCH ===== */
    .search-area{ max-width:1240px; margin:0 auto; padding:0 12px 8px; }
    .ac-wrap{ position:relative; }
	
.btn-search{
  height:38px;
  padding:6px 12px;
  font-size:16px;
}
    .meta{ color:#6b7280; font-size:13px; margin-top:8px; }
    .status{ margin-top:6px; font-size:13px; }

    /* ===== RESULTS ===== */
    .results-area{ max-width:1240px; margin:10px auto 10px; }
    .result-row{
      background:#fff; border:1px solid var(--border); border-radius:14px;
      margin:0 8px 10px; padding:10px 12px;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      box-shadow: var(--shadow);
      transition: background .15s ease;
    }
    .result-row:hover{ background:#fbfcff; }

    .pill{
      display:inline-flex; 
	  align-items:center;
      padding:14px 26px; 
	  border-radius:999px;
      color:#fff; 
	  font-weight:900; 
	  line-height:1; 
	  font-size:14px; 
	  white-space:nowrap;
    }
    .pill-cat{ background:var(--pillCat); }
    .pill-cls{ background:var(--pillCls); }

    .spacer{ flex: 1 1 auto; }
    .btn-info-mini{
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .nores{
      background:#fff; border:1px solid var(--border); border-radius:14px;
      margin:0 8px 10px; padding:10px 12px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap; box-shadow: var(--shadow);
    }
    .nores .btn{ padding:8px 12px; font-weight:900; border-radius:8px; }

    /* ===== AUTOCOMPLETE ===== */
    .ac-panel{
      position:absolute; left:0; right:0; top: calc(100% + 6px);
      background:#fff; border:1px solid var(--border); border-radius:12px;
      box-shadow: var(--shadow); z-index:50;
      display:none; max-height:280px; overflow:auto;
    }
    .ac-item{ padding:10px 12px; font-size:15px; cursor:pointer; border-bottom:1px solid #f1f3f6; }
    .ac-item:last-child{ border-bottom:0; }
    .ac-item:hover, .ac-item.active{ background:#f3f7ff; }
    .ac-muted{ color:#6b7280; font-size:12px; margin-top:2px; }
    .ac-bold{ font-weight:900; }
    .hl{ background:#fff3cd; border-radius:4px; padding:0 2px; }

    /* ===== POPUP (scrollabile) ===== */
    .modal-backdrop-custom{
      position:fixed; inset:0;
      background: rgba(0,0,0,.45);
      display:none;
      z-index: 1000;
      padding: 18px;
    }
    .modal-card{
      width: min(920px, 100%);
      margin: 6vh auto 0;
      background:#fff;
      border-radius:14px;
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      overflow:hidden;
      max-height: 88vh;
      display:flex;
      flex-direction:column;
    }
    .modal-head{
      padding: 12px 14px;
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:10px;
      border-bottom: 1px solid #eef2f6;
      font-weight: 900;
      flex: 0 0 auto;
    }
    .modal-body{
      padding: 14px;
      font-size: 15px;
      overflow:auto;
      flex: 1 1 auto;
    }
    .kv{
      margin-bottom: 10px;
      padding: 10px 12px;
      border:1px solid #eef2f6;
      border-radius:12px;
      background:#fafbfd;
    }
    .kv .k{ color:#6b7280; font-size:12px; font-weight:800; }
    .kv .v{ font-size:16px; font-weight:900; color:#111827; }
    .modal-close{
      border-radius:999px;
      padding: 6px 10px;
      font-weight:900;
    }

    .mini-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid #eef2f6;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      margin-top:10px;
    }
    .mini-table th, .mini-table td{
      padding:10px 12px;
      border-bottom:1px solid #eef2f6;
      vertical-align:top;
      font-size:14px;
    }
    .mini-table th{
      background:#fafbfd;
      font-weight:900;
      color:#111827;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .mini-table tr:last-child td{ border-bottom:0; }

    /* ===== ESEMPI (CENTRATI) ===== */
    .examples-section{
      max-width:1240px;
      margin: 10px auto 40px;
      padding: 0 12px;
    }
    .examples-container{
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
      box-shadow: var(--shadow);
      text-align:center;
    }
    .examples-head{
      display:flex;
      justify-content:center;
      margin-bottom:12px;
    }
    .examples-main-title{
      font-size:20px;
      font-weight:900;
      margin:0;
      color:#1f2a37;
      text-align:center;
      width:100%;
    }

    .examples-empty{
      color:#6b7280;
      font-size:14px;
    }

    .examples-group{
      margin: 0 auto 14px;
      padding-bottom:14px;
      border-bottom:1px solid #eef2f6;
      max-width: 920px;
      text-align:left;
    }
    .examples-group:last-child{
      margin-bottom:0;
      padding-bottom:0;
      border-bottom:0;
    }
    .examples-fascicolo{
      font-weight:900;
      margin-bottom:6px;
    }
    .examples-sotto ul{
      margin: 0;
      padding-left: 18px;
    }
    .examples-sotto li{
      margin: 2px 0;
      color:#6b7280;
      font-size:14px;
    }

@media (max-width:576px){

  .pill{
    font-size:20px;
    padding:14px 18px;
    width:100%;
    justify-content:center;
    text-align:center;
    white-space:normal;   /* permette al testo di andare a capo */
    line-height:1.3;
  }

  .btn-info-mini{
    width:100%;
    justify-content:center;
  }

  .spacer{ display:none; }
}

/* ===== TOPBAR MOBILE MINIMAL ===== */
@media (max-width:576px){

  .topbar{
    margin-top:10px;
    justify-content:flex-end;
  }

  .topbar-user{
    padding:6px 8px;
    gap:8px;
    box-shadow: none;
    border-radius:12px;
    max-width: 92vw;
  }

  .topbar-user .who{
    font-size:13px;
    font-weight:800;
    max-width: 58vw;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .btn-logout{
    padding:6px 10px;
    font-size:0;     /* nasconde la scritta "Logout" */
    line-height:1;
    border-radius:10px;
  }
  .btn-logout::before{
    content:"⎋";
    font-size:16px;
  }
}	


/* ===== USER ICON MENU ===== */

.user-menu{
  position:relative;
}

.user-icon{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid var(--border);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: var(--shadow);
}

.user-dropdown{
  position:absolute;
  right:0;
  top:52px;
  width:220px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow: var(--shadow);
  padding:12px;
  display:none;
  z-index:100;
}

.user-dropdown.show{
  display:block;
}

.user-name{
  font-weight:900;
  font-size:14px;
  color:#111827;
  word-break:break-word;
}
  </style>
</head>

<body>

  <!-- ===================== LOGIN VIEW ===================== -->
  <section id="loginView" class="login-wrap" aria-label="Login">
    <div class="logo-wrap" aria-label="Logo">
      <a class="logo-link" href="#" aria-label="Logo" id="logoLogin">
        <img src="logo.png" alt="Logo" class="logo-img">
      </a>
    </div>

    <div class="login-card">
      <div class="login-title">Accesso</div>
      <div class="login-sub">Inserisci mail e password per continuare</div>

      <div class="mb-3">
        <label class="form-label fw-bold" for="loginMail">Mail</label>
        <input id="loginMail" class="form-control input-lg" type="email" placeholder="nome@dominio.it" autocomplete="username">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold" for="loginPass">Password</label>
        <input id="loginPass" class="form-control input-lg" type="password" placeholder="Password" autocomplete="current-password">
      </div>

      <div class="d-grid login-actions">
        <button id="btnLogin" class="btn btn-primary" type="button">Accedi</button>
      </div>

      <div id="loginStatus" class="login-status text-danger"></div>
    </div>
  </section>

  <!-- ===================== APP VIEW ===================== -->
  <section id="appView" style="display:none;">
  
  
<div class="topbar" aria-label="Barra utente">

  <div class="user-menu">
    
    <button id="userIcon" class="user-icon" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 8a3 3 0 1 0-0-6 3 3 0 0 0 0 6zm3.5 1a4.5 4.5 0 0 1 4.5 4.5v.5H0v-.5A4.5 4.5 0 0 1 4.5 9h7z"/>
      </svg>
    </button>

    <div id="userDropdown" class="user-dropdown">
      <div class="user-name" id="loggedWho">—</div>
      <button id="btnLogout" class="btn btn-outline-primary w-100 mt-2">Logout</button>
    </div>

  </div>

</div>





    <div class="hero">
      <div class="logo-wrap" aria-label="Logo">
        <!-- IMPORTANTE: href="#" e NON index.html (niente reload) -->
        <a class="logo-link" href="#" aria-label="Torna alla home" id="logoHome">
          <img src="logo.png" alt="Logo" class="logo-img">
        </a>
      </div>
      <h1>Ricerca Documentale</h1>
    </div>

    <div class="search-area">
      <div class="ac-wrap">
        <input id="q" class="form-control input-lg" type="text"
               placeholder="Inizia a scrivere qui che tipo di documento che devi classificare"
               autocomplete="off" spellcheck="false">
        <div id="acPanel" class="ac-panel" role="listbox" aria-label="Suggerimenti Fascicolo"></div>
      </div>

      <div class="d-grid mt-3">
        <button id="btnSearch" class="btn btn-primary btn-search" type="button">Cerca</button>
      </div>

      <div id="meta" class="meta"></div>
      <div id="status" class="status text-danger"></div>
    </div>

    <section class="results-area" aria-label="Risultati">
      <div id="results"></div>
    </section>

    <section class="examples-section" aria-label="Esempi di fascicolazione">
      <div class="examples-container">
        <div class="examples-head">
          <div class="examples-main-title">Esempi di fascicolazione</div>
        </div>
        <div id="examplesContent" class="examples-empty">
          Queste informazioni si compileranno automaticamente non appena avrai effettuato una ricerca
        </div>
      </div>
    </section>

    <!-- POPUP -->
    <div id="modalBackdrop" class="modal-backdrop-custom" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <div id="modalTitle">Informazioni</div>
          <button id="modalClose" class="btn btn-outline-primary modal-close" type="button">Chiudi</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

<script>
  /***********************
   * UTILS
   ***********************/
  function escapeHtml(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  function normalize(s){ return (s ?? "").toString().toLowerCase().trim(); }
  function splitTerms(q){ return q.split(/[,]+|\s+/g).map(t=>t.trim()).filter(Boolean); }
  function isValidEmailBasic(s){
    return typeof s === "string" && s.includes("@") && s.indexOf("@") > 0 && s.indexOf("@") < s.length - 1;
  }

  /***********************
   * DOM
   ***********************/
  const loginView = document.getElementById("loginView");
  const appView   = document.getElementById("appView");

  const loginMail = document.getElementById("loginMail");
  const loginPass = document.getElementById("loginPass");
  const btnLogin  = document.getElementById("btnLogin");
  const loginStatus = document.getElementById("loginStatus");

  const loggedWhoEl = document.getElementById("loggedWho");
  const btnLogout = document.getElementById("btnLogout");

  const qEl = document.getElementById("q");
  const btnSearch = document.getElementById("btnSearch");
  const metaEl = document.getElementById("meta");
  const statusEl = document.getElementById("status");
  const resultsEl = document.getElementById("results");
  const acPanel = document.getElementById("acPanel");

  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalBody = document.getElementById("modalBody");
  const modalTitle = document.getElementById("modalTitle");
  const modalClose = document.getElementById("modalClose");

  const examplesContent = document.getElementById("examplesContent");

  const logoHome = document.getElementById("logoHome");
  const logoLogin = document.getElementById("logoLogin");
  
  const userIcon = document.getElementById("userIcon");
const userDropdown = document.getElementById("userDropdown");

userIcon.addEventListener("click", ()=>{
  userDropdown.classList.toggle("show");
});

document.addEventListener("click",(e)=>{
  if(!userIcon.contains(e.target) && !userDropdown.contains(e.target)){
    userDropdown.classList.remove("show");
  }
});

  /***********************
   * STATE
   ***********************/
  let utentiRows = null;
  let fascicoliRows = null;
  let tipologiaRows = null;

  // Autocomplete
  let fascicoliList = [];
  let acShown = [];
  let acActive = -1;
  let exactMode = false;
  let lastExactValue = "";

  /***********************
   * VIEW HELPERS
   ***********************/
  function clearSearchUI(){
    resultsEl.innerHTML = "";
    metaEl.innerHTML = "";
    statusEl.textContent = "";
  }

  function resetToHomeClean(){
    // chiude tutto e torna “pulito”
    hideAutocomplete();
    closeModal();
    clearSearchUI();

    qEl.value = "";
    exactMode = false;
    lastExactValue = "";

    examplesContent.className = "examples-empty";
    examplesContent.textContent = "Queste informazioni si compileranno automaticamente non appena avrai effettuato una ricerca";

    qEl.focus();
  }

  /***********************
   * LOGIN / SESSION
   ***********************/
  function setLoggedLabel(ente, nome, cognome){
    const label = [ente, (nome + " " + cognome).trim()].filter(Boolean).join(" - ");
    loggedWhoEl.textContent = label || "Utente";
  }

  function showApp(user){
    loginView.style.display = "none";
    appView.style.display = "block";

    // Supporta sia Excel (Ente/Nome/Cognome) sia sessione (ente/nome/cognome)
    const ente = (user["Ente"] ?? user["ENTE"] ?? user.ente ?? "").toString().trim();
    const nome = (user["Nome"] ?? user["NOME"] ?? user.nome ?? "").toString().trim();
    const cognome = (user["Cognome"] ?? user["COGNOME"] ?? user.cognome ?? "").toString().trim();

    setLoggedLabel(ente, nome, cognome);

    // salva sempre nello stesso formato
    sessionStorage.setItem("authUser", JSON.stringify({ ente, nome, cognome }));
  }

  function showLogin(){
    appView.style.display = "none";
    loginView.style.display = "block";
    loggedWhoEl.textContent = "—";
    sessionStorage.removeItem("authUser");
  }

  async function loadUtentiXlsx(){
    if(utentiRows) return utentiRows;

    const res = await fetch("utenti.xlsx", { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);

    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type:"array" });

    const sheetU = wb.SheetNames.find(n => n.toLowerCase().trim() === "utenti") || wb.SheetNames[0];
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetU], { defval:"" });

    utentiRows = rows;
    return rows;
  }

  function findUserByCredentials(rows, email, password){
    const e = normalize(email);
    const p = (password ?? "").toString();

    return rows.find(r => {
      const m = normalize(r["mail"] ?? r["MAIL"] ?? r["Mail"] ?? r["EMAIL"] ?? r["email"]);
      const pw = (r["password"] ?? r["PASSWORD"] ?? r["Password"] ?? r["PASS"] ?? r["pass"] ?? "").toString();
      return m === e && pw === p;
    }) || null;
  }

  async function doLogin(){
    loginStatus.textContent = "";
    const email = (loginMail.value || "").trim();
    const pass  = (loginPass.value || "").toString();

    if(!email || !pass){
      loginStatus.textContent = "Inserisci mail e password.";
      return;
    }
    if(!isValidEmailBasic(email)){
      loginStatus.textContent = "Mail non valida: deve contenere il carattere '@'.";
      return;
    }

    try{
      const rows = await loadUtentiXlsx();
      if(!rows.length){
        loginStatus.textContent = "utenti.xlsx è vuoto o non leggibile.";
        return;
      }

      const user = findUserByCredentials(rows, email, pass);
      if(!user){
        loginStatus.textContent = "Credenziali non valide.";
        return;
      }

      showApp(user);
      await loadDbXlsx();
      resetToHomeClean();

    }catch(err){
      console.error(err);
      loginStatus.textContent = "Errore caricando utenti.xlsx. Apri via http:// (non file://) e metti utenti.xlsx nella stessa cartella.";
    }
  }

  btnLogin.addEventListener("click", doLogin);
  loginMail.addEventListener("keydown", (e)=>{ if(e.key === "Enter") doLogin(); });
  loginPass.addEventListener("keydown", (e)=>{ if(e.key === "Enter") doLogin(); });

  btnLogout.addEventListener("click", ()=>{
    showLogin();
    // pulizia UI
    try{
      resetToHomeClean();
    }catch(_){}
  });

  // Logo nella login: non fa nulla (evita jump)
  if(logoLogin){
    logoLogin.addEventListener("click", (e)=> e.preventDefault());
  }

  // ✅ Logo nell’app: HOME PULITA senza reload
  if(logoHome){
    logoHome.addEventListener("click", (e)=>{
      e.preventDefault();
      resetToHomeClean();
    });
  }

  // Auto-login se in sessione
  const savedUserStr = sessionStorage.getItem("authUser");
  if(savedUserStr){
    try{
      const saved = JSON.parse(savedUserStr);
      showApp(saved);
      // carica db e mostra home pulita
      loadDbXlsx().then(()=> resetToHomeClean());
    }catch(_){
      // se sessione corrotta, torna login
      showLogin();
    }
  }

  /***********************
   * AUTOCOMPLETE
   ***********************/
  function highlight(text, needle){
    const t = text.toString();
    const n = needle.toString();
    if(!n) return escapeHtml(t);
    const i = t.toLowerCase().indexOf(n.toLowerCase());
    if(i < 0) return escapeHtml(t);
    const a = escapeHtml(t.slice(0,i));
    const b = escapeHtml(t.slice(i, i+n.length));
    const c = escapeHtml(t.slice(i+n.length));
    return `${a}<span class="hl">${b}</span>${c}`;
  }

  function buildFascicoliIndex(allRows){
    const set = new Set();
    for(const r of allRows){
      const v = (r["FASCICOLO"] ?? "").toString().trim();
      if(v) set.add(v);
    }
    fascicoliList = [...set].sort((a,b)=>a.localeCompare(b,"it"));
  }

  function showAutocomplete(items, typed){
    acPanel.innerHTML = "";
    acShown = items;
    acActive = -1;
    if(!items.length){ acPanel.style.display = "none"; return; }

    items.forEach((txt, idx)=>{
      const div = document.createElement("div");
      div.className = "ac-item";
      div.setAttribute("role","option");
      div.dataset.index = idx;
      div.innerHTML = `
        <div class="ac-bold">${highlight(txt, typed)}</div>

      `;
      div.addEventListener("mousedown", (e)=>{
        e.preventDefault();
        applyAutocomplete(idx);
      });
      acPanel.appendChild(div);
    });

    acPanel.style.display = "block";
  }

  function hideAutocomplete(){
    acPanel.style.display = "none";
    acPanel.innerHTML = "";
    acShown = [];
    acActive = -1;
  }

  function setActive(idx){
    const nodes = [...acPanel.querySelectorAll(".ac-item")];
    nodes.forEach(n => n.classList.remove("active"));
    if(idx >= 0 && idx < nodes.length){
      nodes[idx].classList.add("active");
      acActive = idx;
      nodes[idx].scrollIntoView({ block:"nearest" });
    } else {
      acActive = -1;
    }
  }

  function applyAutocomplete(idx){
    const value = acShown[idx];
    if(!value) return;

    exactMode = true;
    lastExactValue = value;

    qEl.value = value;
    hideAutocomplete();
    doSearch();
  }

  function updateAutocomplete(){
    if(!fascicoliList.length){ hideAutocomplete(); return; }

    const typed = qEl.value.trim();
    const q = normalize(typed);
    if(q.length < 2){ hideAutocomplete(); return; }

    const hits = fascicoliList
      .filter(x => x.toLowerCase().includes(q))
      .slice(0, 8);

    showAutocomplete(hits, typed);
  }

  /***********************
   * SEARCH / RENDER
   ***********************/
  function groupPairsWithInd(matchedRows){
    const map = new Map();
    for(const r of matchedRows){
      const cat = (r["CATEGORIA"] || "(CATEGORIA vuota)").toString().trim();
      const cls = (r["CLASSE"] || "(CLASSE vuota)").toString().trim();
      const indCat = (r["IND_CATEGORIA"] || "").toString().trim();
      const indCls = (r["IND_CLASSE"] || "").toString().trim();
      const key = cat + "||" + cls;

      if(!map.has(key)){
        map.set(key, { cat, cls, indCat, indCls });
      } else {
        const cur = map.get(key);
        if(!cur.indCat && indCat) cur.indCat = indCat;
        if(!cur.indCls && indCls) cur.indCls = indCls;
      }
    }

    return [...map.values()].sort((a,b)=>{
      const c = a.cat.localeCompare(b.cat,"it");
      if(c!==0) return c;
      return a.cls.localeCompare(b.cls,"it");
    });
  }

  function openModal(title, html){
    modalTitle.textContent = title;
    modalBody.innerHTML = html;
    modalBackdrop.style.display = "block";
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
  }

  function closeModal(){
    modalBackdrop.style.display = "none";
    modalBody.innerHTML = "";
    document.documentElement.style.overflow = "";
    document.body.style.overflow = "";
  }

  modalClose.addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", (e)=>{ if(e.target === modalBackdrop) closeModal(); });
  document.addEventListener("keydown", (e)=>{ if(e.key === "Escape" && modalBackdrop.style.display === "block") closeModal(); });

  // JOIN (interno): fascicoli.IND_* -> tipologia.CATEGORIA/CLASSE
  function findTipologiaAll(indCat, indCls){
    if(!tipologiaRows || !tipologiaRows.length) return [];
    const a = normalize(indCat);
    const b = normalize(indCls);
    return tipologiaRows.filter(t =>
      normalize(t["CATEGORIA"]) === a &&
      normalize(t["CLASSE"]) === b
    );
  }

  function updateExamples(indCat, indCls){
    if(!fascicoliRows || !fascicoliRows.length){
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Database non caricato.";
      return;
    }

    if(!indCat || !indCls){
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "IND_CATEGORIA / IND_CLASSE mancanti: impossibile mostrare esempi.";
      return;
    }

    const a = normalize(indCat);
    const b = normalize(indCls);

    const filtered = fascicoliRows.filter(r =>
      normalize(r["IND_CATEGORIA"]) === a &&
      normalize(r["IND_CLASSE"]) === b
    );

    if(!filtered.length){
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Nessun esempio trovato per questa categoria/classe.";
      return;
    }

    const map = new Map();
    for(const r of filtered){
      const f = (r["FASCICOLO"] ?? "").toString().trim() || "(vuoto)";
      const s = (r["SOTTOFASCICOLO"] ?? "").toString().trim();
      if(!map.has(f)) map.set(f, new Set());
      if(s) map.get(f).add(s);
    }

    const fascicoli = [...map.keys()].sort((x,y)=>x.localeCompare(y,"it"));

    examplesContent.className = "";
    examplesContent.innerHTML = fascicoli.map(f=>{
      const sottos = [...map.get(f)].sort((x,y)=>x.localeCompare(y,"it"));

      if(!sottos.length){
        return `
          <div class="examples-group">
            <div class="examples-fascicolo"><strong>Fascicolo:</strong> ${escapeHtml(f)}</div>
          </div>
        `;
      }

      const li = sottos.map(s => `<li><strong>Sottofascicolo:</strong> ${escapeHtml(s)}</li>`).join("");
      return `
        <div class="examples-group">
          <div class="examples-fascicolo"><strong>Fascicolo:</strong> ${escapeHtml(f)}</div>
          <div class="examples-sotto"><ul>${li}</ul></div>
        </div>
      `;
    }).join("");
  }

  function buildTipologiaTable(rows){
    const cols = ["TIPOLOGIA DOCUMENTARIA", "CONSERVAZIONE"];
    const thead = `<tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
    const tbody = rows.map(r => {
      return `<tr>${cols.map(c => `<td>${escapeHtml((r[c] ?? "").toString().trim() || "(vuoto)")}</td>`).join("")}</tr>`;
    }).join("");
    return `
      <table class="mini-table" aria-label="Risultati tipologia">
        <thead>${thead}</thead>
        <tbody>${tbody}</tbody>
      </table>
    `;
  }

  function render(pairs, label){
    clearSearchUI();

metaEl.innerHTML = "";

    if(!pairs.length){
      resultsEl.innerHTML = `
        <div class="nores">
          <div class="fw-bold">Nessun risultato trovato</div>
          <a class="btn btn-primary" href="https://immediaspa.com/area_clienti/" target="_blank" rel="noopener">
            Contatta il nostro consulente
          </a>
        </div>
      `;
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Nessun risultato: passa su un risultato quando disponibile.";
      return;
    }

    const frag = document.createDocumentFragment();

    pairs.forEach((p)=>{
      const row = document.createElement("div");
      row.className = "result-row";

      row.innerHTML = `
        <div class="pill pill-cat">CATEGORIA: ${escapeHtml(p.cat)}</div>
        <div class="pill pill-cls">CLASSE: ${escapeHtml(p.cls)}</div>
        <div class="spacer"></div>
        <button class="btn btn-outline-primary btn-info-mini" type="button">Informazioni</button>
      `;

      row.addEventListener("mouseenter", ()=>{
        updateExamples(p.indCat, p.indCls);
      });

      row.querySelector("button").addEventListener("click", ()=>{
        updateExamples(p.indCat, p.indCls);

        const indCat = (p.indCat || "").toString().trim();
        const indCls = (p.indCls || "").toString().trim();

        if(!indCat || !indCls){
          openModal("Informazioni", `
            <div class="kv">
              <div class="k">Errore</div>
              <div class="v">IND_CATEGORIA / IND_CLASSE mancanti per questo record.</div>
            </div>
          `);
          return;
        }

        const rows = findTipologiaAll(indCat, indCls);

        if(!rows.length){
          // ✅ QUI: NIENTE "JOIN"
openModal("Informazioni", `
  <div class="kv">
    <div class="k">Esito</div>
    <div class="v">Nessuna corrispondenza trovata nella scheda "tipologia"</div>
  </div>
  <div class="kv">
    <div class="k">Categoria / Classe</div>
    <div class="v">${escapeHtml(p.cat)} — ${escapeHtml(p.cls)}</div>
  </div>
`);
          return;
        }

        // Deduplica
        const uniq = [];
        const seen = new Set();
        for(const r of rows){
          const key = normalize(r["TIPOLOGIA DOCUMENTARIA"]) + "||" + normalize(r["CONSERVAZIONE"]);
          if(!seen.has(key)){
            seen.add(key);
            uniq.push(r);
          }
        }

        // ✅ QUI: NIENTE "JOIN"
openModal("Informazioni", `
  <div class="kv">
    <div class="k">Categoria / Classe</div>
    <div class="v">${escapeHtml(p.cat)} — ${escapeHtml(p.cls)}</div>
  </div>
  ${buildTipologiaTable(uniq)}
`);
      });

      frag.appendChild(row);
    });

    resultsEl.appendChild(frag);

    const first = pairs[0];
    updateExamples(first.indCat, first.indCls);
  }

  function doSearch(){
    statusEl.textContent = "";
    hideAutocomplete();
    resultsEl.innerHTML = "";
    metaEl.innerHTML = "";

    if(!fascicoliRows){
      statusEl.textContent = "DB non caricato. Apri via http:// e assicurati che db.xlsx sia nella stessa cartella.";
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Database non caricato.";
      return;
    }

    const input = qEl.value.trim();
    if(!input){
      statusEl.textContent = "Inserisci un valore.";
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Inserisci un valore per vedere esempi.";
      return;
    }

    if(normalize(input) !== normalize(lastExactValue)){
      exactMode = false;
    }

    let matched = [];

    if(exactMode){
      const needle = normalize(input);
      matched = fascicoliRows.filter(r => normalize(r["FASCICOLO"]) === needle);
      render(groupPairsWithInd(matched), input);
      return;
    }

    const terms = splitTerms(input).map(t => t.toLowerCase());
    matched = fascicoliRows.filter(r=>{
      const text = normalize(r["FASCICOLO"]) + " " + normalize(r["SOTTOFASCICOLO"]);
      return terms.some(t => text.includes(t));
    });

    render(groupPairsWithInd(matched), input);
  }

  btnSearch.addEventListener("click", doSearch);

  qEl.addEventListener("input", ()=>{
    exactMode = false;
    updateAutocomplete();
  });

  qEl.addEventListener("keydown", (e)=>{
    const panelOpen = acPanel.style.display === "block";

    if(panelOpen && (e.key === "ArrowDown" || e.key === "ArrowUp")){
      e.preventDefault();
      if(e.key === "ArrowDown") setActive(Math.min(acActive + 1, acShown.length - 1));
      if(e.key === "ArrowUp") setActive(Math.max(acActive - 1, 0));
      return;
    }

    if(e.key === "Escape" && panelOpen){
      hideAutocomplete();
      return;
    }

    if(e.key === "Enter"){
      e.preventDefault();
      if(panelOpen && acActive >= 0){
        applyAutocomplete(acActive);
        return;
      }
      doSearch();
    }
  });

  document.addEventListener("click", (e)=>{
    if(!acPanel.contains(e.target) && e.target !== qEl) hideAutocomplete();
  });

  /***********************
   * LOAD db.xlsx
   ***********************/
  async function loadDbXlsx(){
    try{
      const res = await fetch("db.xlsx", { cache:"no-store" });
      if(!res.ok) throw new Error("HTTP " + res.status);

      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array" });

      const sheetF = wb.SheetNames.find(n=>n.toLowerCase().trim()==="fascicoli") || wb.SheetNames[0];
      fascicoliRows = XLSX.utils.sheet_to_json(wb.Sheets[sheetF], { defval:"" });

      if(!fascicoliRows.length){
        statusEl.textContent = 'Il foglio "fascicoli" è vuoto.';
        examplesContent.className = "examples-empty";
        examplesContent.textContent = "Il foglio fascicoli è vuoto.";
        return;
      }

      const sheetT = wb.SheetNames.find(n=>{
        const k = n.toLowerCase().trim();
        return k === "tipologia" || k === "tilologia";
      });
      tipologiaRows = sheetT ? XLSX.utils.sheet_to_json(wb.Sheets[sheetT], { defval:"" }) : [];

      const neededF = ["FASCICOLO","SOTTOFASCICOLO","CATEGORIA","CLASSE","IND_CATEGORIA","IND_CLASSE"];
      const missingF = neededF.filter(c => !(c in fascicoliRows[0]));
      if(missingF.length){
        statusEl.textContent = 'Colonne mancanti in "fascicoli": ' + missingF.join(", ");
        examplesContent.className = "examples-empty";
        examplesContent.textContent = "Colonne mancanti nel file db.xlsx.";
        return;
      }

      buildFascicoliIndex(fascicoliRows);

    }catch(err){
      console.error(err);
      statusEl.textContent = "Errore caricando db.xlsx. Apri via http:// (non file://) e metti db.xlsx nella stessa cartella.";
      examplesContent.className = "examples-empty";
      examplesContent.textContent = "Errore caricando db.xlsx.";
    }
  }
</script>
